<!doctype html><html><head><meta charset="UTF-8"><title>NASS MAZAO 255</title><link rel="stylesheet" href="styles.css"></head><body>
<div class="app">
  <aside><h1>NASS<br><span>MAZAO 255</span></h1><button data-page="dashboard">Dashboard</button><button data-page="add">Ongeza Taarifa</button><button data-page="stock">Stoo</button><button data-page="settings">Settings</button></aside>
  <main>
    <header><div><h2 id="title">Dashboard</h2><p>Business Manager ya mazao</p></div><div><button id="lang">English</button><button id="updates">Angalia Updates</button></div></header>
    <section id="dashboard" class="page active"><div class="cards" id="cards"></div><h3>Taarifa za karibuni</h3><table><thead><tr><th>Aina</th><th>Zao</th><th>Mtu/Kampuni</th><th>Kiasi</th><th>Tarehe</th></tr></thead><tbody id="txRows"></tbody></table></section>
    <section id="add" class="page"><div class="panel"><h3>Ongeza taarifa mpya</h3><form id="txForm"><div class="grid"><label>Aina<select name="type"><option value="capital">Mtaji</option><option value="purchase">Manunuzi</option><option value="sale">Mauzo</option><option value="expense">Matumizi</option><option value="debt_in">Deni ninalodai</option><option value="debt_out">Deni ninalodaiwa</option></select></label><label>Zao<select name="crop_id" id="cropSelect"></select></label><label>Mtu/Kampuni<input name="person"></label><label>Kiasi/kg<input name="quantity" type="number" step="0.01"></label><label>Bei kwa unit<input name="unit_price" type="number" step="0.01"></label><label>Jumla<input name="amount" type="number" step="0.01"></label><label>Iliyolipwa<input name="paid" type="number" step="0.01"></label><label>Tarehe<input name="date" type="date"></label></div><label>Maelezo<textarea name="note"></textarea></label><button class="primary">Hifadhi</button></form></div></section>
    <section id="stock" class="page"><div class="panel"><h3>Stoo ya Mazao</h3><table><thead><tr><th>Zao</th><th>Stock</th><th>Unit</th></tr></thead><tbody id="stockRows"></tbody></table></div></section>
    <section id="settings" class="page"><div class="panel"><h3>Settings</h3><button id="backup">Tengeneza Backup</button><button id="format" class="danger">Format Taarifa Zote</button><p id="status"></p></div></section>
  </main>
</div><script src="app.js"></script></body></html>
